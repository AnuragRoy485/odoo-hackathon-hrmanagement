{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}HRMS Auth{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'core/auth.css' %}">
</head>
<body>
  <div class="backdrop backdrop-a"></div>
  <div class="backdrop backdrop-b"></div>
  <div class="auth-page">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">HRMS</div>
        <div class="brand-copy">
          <p>Workforce access</p>
          <h1>People ops sign-in for Django and DRF.</h1>
        </div>
      </div>
      <nav class="topnav" aria-label="Authentication navigation">
        <a href="{% url 'auth-home' %}" class="{% if request.resolver_match.url_name == 'auth-home' or request.resolver_match.url_name == 'auth-login' %}active{% endif %}">Login</a>
        <a href="{% url 'auth-signup' %}" class="{% if request.resolver_match.url_name == 'auth-signup' %}active{% endif %}">Signup</a>
      </nav>
    </header>

    <main class="shell">
      {% block content %}{% endblock %}
    </main>
  </div>

  <script src="{% static 'core/auth.js' %}" defer></script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
